name: Release

on:
    workflow_dispatch:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: yarn

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: stable
                  cache: false

            - name: Install dependencies
              run: yarn install --immutable

            - name: Verify tag matches app version
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  VERSION=$(node -p "require('./package.json').version")

                  if [ "$TAG" != "v$VERSION" ]; then
                      echo "Tag $TAG does not match app version $VERSION"
                      exit 1
                  fi

            - name: Verify changelog contains release tag
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  TAG="${GITHUB_REF_NAME}"

                  if ! grep -Eq "^##[[:space:]]+(\[$TAG\]|$TAG)$" CHANGELOG.md; then
                      echo "CHANGELOG.md does not contain an entry for $TAG"
                      echo "Expected: ## $TAG or ## [$TAG]"
                      exit 1
                  fi

            - name: Stage release files
              run: yarn release:stage

            # SignPath will go here later.
            #
            # It needs to run after staging and before zipping, because it must replace:
            #
            # release/romrack-windows-x64/romrack.exe
            # release/romrack-windows-arm64/romrack.exe
            #
            # with signed versions.

            - name: Zip release files
              run: yarn release:zip

            - name: Upload ZIPs as workflow artifact
              uses: actions/upload-artifact@v7
              with:
                  name: romrack-release-zips
                  path: release/romrack-*.zip
                  retention-days: 7

            - name: Create GitHub release
              if: startsWith(github.ref, 'refs/tags/')
              env:
                  GH_TOKEN: ${{ github.token }}

              run: |
                  awk '
                    /^## / { count++ }
                    count == 1 { print }
                    count == 2 { exit }
                  ' CHANGELOG.md > RELEASE_NOTES.md

                  gh release create "${GITHUB_REF_NAME}" ./release/romrack-*.zip \
                    --title "${GITHUB_REF_NAME}" \
                    --notes-file RELEASE_NOTES.md \
                    --verify-tag \
                    --latest
